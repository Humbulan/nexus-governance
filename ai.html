<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Neural Command • HMB Imperial</title>
    <style>
        body { background: #060c14; color: #e6f7ff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .brain-core { border: 2px solid #722ed1; padding: 30px; border-radius: 20px; max-width: 600px; margin: 20px auto; background: rgba(114, 46, 209, 0.08); box-shadow: 0 0 40px rgba(114, 46, 209, 0.3); position: relative; }
        .neural-pulse { height: 80px; width: 80px; background: #722ed1; border-radius: 50%; margin: 0 auto 20px; filter: blur(15px); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(0.9); opacity: 0.5; } }
        h1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); margin-bottom: 5px; }
        .status-badge { background: #52c41a; color: #000; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; display: inline-block; margin-bottom: 25px; }
        .progress-container { width: 100%; background: #1a1a1a; border-radius: 10px; margin-bottom: 25px; border: 1px solid #722ed1; }
        .progress-bar { width: 59.5%; height: 20px; background: linear-gradient(90deg, #722ed1, #13c2c2); border-radius: 10px; text-align: right; padding-right: 10px; font-size: 0.8rem; line-height: 20px; color: white; font-weight: bold; }
        .intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .intel-card { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #722ed1; padding: 12px; border-radius: 4px; }
        .intel-card small { color: #13c2c2; text-transform: uppercase; font-size: 0.7rem; }
        .intel-card div { font-weight: bold; font-size: 0.9rem; margin-top: 4px; }
        .back-link { color: #ffd700; text-decoration: none; font-size: 0.8rem; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="navigation.html" class="back-link">⬅️ BACK TO COMMAND CENTER</a>
    <div class="brain-core">
        <div class="neural-pulse"></div>
        <h1>🧠 AI COMMAND CENTER</h1>
        <div class="status-badge">LLAMA 3.2: OPERATIONAL</div>
        
        <div style="text-align: left; margin-bottom: 5px;"><small>Q1 SCALING PROGRESS</small></div>
        <div class="progress-container">
            <div class="progress-bar">59.5%</div>
        </div>

        <div class="intel-grid">
            <div class="intel-card">
                <small>LOGISTICS</small>
                <div>Route Optimization: ACTIVE</div>
            </div>
            <div class="intel-card">
                <small>FINANCE</small>
                <div>R595,238.10 Processing</div>
            </div>
            <div class="intel-card">
                <small>ANALYSIS</small>
                <div>17-Vehicle Telemetry Feed</div>
            </div>
            <div class="intel-card">
                <small>PREDICTION</small>
                <div>R1M Target Forecasting</div>
            </div>
        </div>
    </div>
    <div style="margin-top: 20px; font-family: monospace; color: #444;">HMB_IMPERIAL_NEURAL_v1.0.Final</div>
</body>
</html>
